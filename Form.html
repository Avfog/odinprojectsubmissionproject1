<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FormThingy</title>
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <div class="left side">
        <img src="Images/Baku.jpg" alt="Main Image" class="BakuImage">
    </div>

    <div>
        <img src="Images/Baku3.jpg" alt="Second Image" class="BakuImage2">
    </div>

    <div class="right side">
        <p class="suggestion">This is not a real online service! You know you need something<br> like this in your life to help you realize your deepest dreams.
        <br>Sign up <i>now</i> to get started.
<br><br>You <i>know</i> you want to.</p>
        <div class ="form-container">
        <form action="submit_form" method="post">
            <h2>Let's do this!</h2>
            <div class="box">
            <label for="First_name">FIRST NAME</label><br>
            <input type="text" id="First_name" name="First_name" required>
            </div>

            <div class="box">
            <label for="Last_name">LAST NAME</label><br>
            <input type="text" id="Last_name" name="Last_name" required><br><br>
            </div>

            <div class="box">
            <label for="email">EMAIL</label><br>
            <input type="email" id="email" name="email" required><br><br>
            </div>

            <div class="box">
            <label for="Phone_number">PHONE NUMBER</label><br>
            <input type="tel" id="Phone_number" name="Phone_number" required>
            </div>

            <div class="box">
            <label for="password">PASSWORD</label><br>
            <input type="password" id="password" name="password" required><br><br>
            </div>
            
            <div class="box">
            <label for="Confirm_password">CONFIRM PASSWORD</label><br>
            <input type="password" id="Confirm_password" name="Confirm_password" required>
            </div>

            <div class="ending">
            </div>

            </div class="submit">
            <input type="submit" value="Create Account" class="submit">
        </form>
        <div>
            <h3 class="Question"> Already have an account?
                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="LogIn">Log in</a>
            </h3>
        </div>
    
    </div>


</body>
</html>
